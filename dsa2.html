id:"m9",num:"09",title:"Searching — Binary Search on Answer (Imaginary Search Space)",desc:"Classes 56–57: When to apply BS on imaginary SS, Painter's Partition, Aggressive Cows, Smallest subarray sum ≥ S — full dry runs and check functions.",
html:`
<h3><span class="dot"></span>Today's content (Classes 56–57)</h3>
<ul class="points">
  <li>When to apply BS — Types of problems</li>
  <li>How to identify BS on answer (Imaginary Search Space)</li>
  <li>Painter's Partition — minimize max time</li>
  <li>Aggressive Cows — maximize minimum distance</li>
  <li>Smallest subarray with sum ≥ S</li>
</ul>

<h3><span class="dot"></span>When to Apply Binary Search</h3>
<div class="keybox">
  <div class="kb-title">◆ Problem Types Where BS Applies</div>
  <ul>
    <li><strong>Find something</strong> — classic BS in real search space</li>
    <li><strong>Minimum/Maximum</strong> — lowest/smallest/greatest/largest → think BS</li>
  </ul>
  <p><em>If you see these words in a problem, think Binary Search.</em></p>
</div>

<div class="keybox">
  <div class="kb-title">◆ How to Apply BS — 3 Steps</div>
  <ul>
    <li><strong>1. Target:</strong> What are we finding?</li>
    <li><strong>2. Search Space (Real or Imaginary):</strong> Must contain answer for any input.</li>
    <li><strong>3. Discard:</strong> At every step, can we discard half the search space?</li>
  </ul>
  <p><strong>For Real SS:</strong> Figure out cases based on condition.</p>
  <p><strong>For Imaginary SS — The Pattern:</strong></p>
</div>
<pre class="code"><span class="cm">// Imaginary Search Space Pattern 1: F F F F [T] T T T .. T</span>
<span class="cm">// Find first True → when m is True: ans=m, go left; when False: go right</span>
<span class="cm">//</span>
<span class="cm">// Imaginary Search Space Pattern 2: T T T T [F] F F F .. F</span>
<span class="cm">// Find last True → when m is True: ans=m, go right; when False: go left</span>
<span class="cm">//</span>
<span class="cm">// If imaginary SS falls under either pattern → apply BS ✓</span></pre>

<div class="problem">
  <div class="prob-head"><div class="prob-title">GFG — Painter's Partition</div><div class="prob-meta"><span class="badge gfg">GFG</span><span class="badge hard">Hard</span></div></div>
  <div class="prob-desc">N boards with lengths {l₀,l₁,...,lₙ₋₁} and W painters. One painter takes 1 sec per unit length. Each painter paints continuous boards only. All start together. Find minimum time to paint all boards.</div>
  <div class="ex-box"><span class="lbl">Notes: Examples</span>
    l={3,5,1,7,8,2,5,3,10,1,4,7,5,4,6}, W=3 → best partition gives ans=25 (W₁=24, W₂=25, W₃=22)<br>
    l={1,1,1,1,1,101}, W=2 → ans=101 (one board length exceeds average → can't do better)
  </div>
  <div class="approach-box"><div class="a-title">Idea: "Avg allot time" doesn't work. BS on answer!</div>
    <p><strong>Target:</strong> Minimum time needed.</p>
    <p><strong>Search Space (Imaginary):</strong> [l=1, h=sum(len)]. Note: answer always lies in this range for any input.</p>
    <p><strong>Discard logic:</strong> If we can paint all boards in m time → ans=m, go left (can we do better?). If we can't → go right.</p>
    <p><strong>TC:</strong> O(log(sum(len)) × N) — BS iterations × check function</p>
  </div>
<pre class="code"><span class="cm">// Check function: can we paint all boards in m time with W painters?</span>
<span class="cm">// Key: if any single board length > m → return false immediately!</span>
<span class="cm">// Greedy: accumulate boards for current painter; if adding l[i] exceeds m → new painter</span>
<span class="ty">bool</span> <span class="fn">check</span>(<span class="ty">vector</span>&lt;<span class="ty">int</span>&gt;&amp; blen,<span class="ty">int</span> m,<span class="ty">int</span> W){  <span class="cm">// TC: O(N), SC: O(1)</span>
    <span class="ty">int</span> painters=1,tw=0;
    <span class="kw">for</span>(<span class="ty">int</span> i=0;i&lt;(<span class="ty">int</span>)blen.size();i++){
        <span class="kw">if</span>(blen[i]&gt;m) <span class="kw">return</span> <span class="kw">false</span>;    <span class="cm">// single board > m → impossible</span>
        tw+=blen[i];
        <span class="kw">if</span>(tw&gt;m){painters++;tw=blen[i];} <span class="cm">// exceeded: assign new painter</span>
    }
    <span class="kw">return</span> painters&lt;=W;
}

<span class="ty">int</span> <span class="fn">minTime</span>(<span class="ty">vector</span>&lt;<span class="ty">int</span>&gt;&amp; blen,<span class="ty">int</span> N,<span class="ty">int</span> W){  <span class="cm">// TC: O(log(sum)×N)</span>
    <span class="ty">long long</span> l=1,h=0,ans=0;
    <span class="kw">for</span>(<span class="ty">int</span> x:blen) h+=x;  <span class="cm">// h = sum of all lengths (worst case: 1 painter)</span>
    <span class="kw">while</span>(l&lt;=h){
        <span class="ty">long long</span> m=(l+h)/2;
        <span class="kw">if</span>(check(blen,m,W)){ans=m;h=m-1;}  <span class="cm">// possible: record and go left</span>
        <span class="kw">else</span>{l=m+1;}                         <span class="cm">// not possible: go right</span>
    }
    <span class="kw">return</span> (<span class="ty">int</span>)ans;
}
<span class="cm">// Dry run: l={3,5,1,7,8,2,5,3,10,1,4,7,5,4,6}, W=3</span>
<span class="cm">// sum=71, l=1,h=71: m=36 → check(36,3)=T → ans=36,h=35</span>
<span class="cm">// m=18 → check(18,3)=T (W1=16,W2=18,W3=10) → ans=18,l=19? No: check dry run in notes</span>
<span class="cm">// For W=4: m=36→T,h=35; m=18→T(l=1,h=35); continue BS until ans=18 ✓</span></pre>
  <div class="info-box">
    <div class="i-title">&#9670; Check function dry run (from notes): l={3,5,1,7,8,2,5,3,10,1,4,7,5,4,6}, W=4, m=18</div>
    <p>C=1,T=0: 3→T=3; 5→T=8; 1→T=9; 7→T=16; 8→T=24&gt;18! → C=2,T=8; 2→T=10; 5→T=15; 3→T=18; 10→T=28&gt;18! → C=3,T=10; 1→T=11; 4→T=15; 7→T=22&gt;18! → C=4,T=7; 5→T=12; 4→T=16; 6→T=22&gt;18! → C=5 → return false. l=m+1.</p>
  </div>
</div>

<div class="problem">
  <div class="prob-head"><div class="prob-title">GFG — Aggressive Cows (SPOJ AGGRCOWS)</div><div class="prob-meta"><span class="badge gfg">GFG</span><span class="badge hard">Hard</span></div></div>
  <div class="prob-desc">S stalls at positions stalls[N] on x-axis. Place C cows such that minimum distance between any 2 cows is maximized. Only 1 cow per stall. All cows must be placed. Positions are sorted.</div>
  <div class="ex-box"><span class="lbl">Examples (from notes)</span>
    stalls={1,2,4,8,9}, C=3 → ans=3 (place at 1,4,9 → min dist=3)<br>
    stalls={2,6,11,14,19,25,30,39,43}, C=4 → ans=12 (place at 2,14,25,39)
  </div>
  <div class="approach-box"><div class="a-title">BS on answer (imaginary SS)</div>
    <p><strong>Target:</strong> Maximum minimum distance between any 2 cows.</p>
    <p><strong>Search Space (Imaginary):</strong> [l=1, h=stalls[N-1]-stalls[0]] — always contains answer.</p>
    <p><strong>Case 1:</strong> Can place cows m distance apart → ans=m, go right (can we do better?). <strong>Case 2:</strong> Cannot → go left.</p>
    <p><strong>TC:</strong> O(log(stalls[N-1]-stalls[0]) × S)</p>
  </div>
<pre class="code"><span class="cm">// Check: can we place C cows with min distance ≥ m?</span>
<span class="cm">// Greedy: place 1st cow at stalls[0]. For each next stall: if dist from last placed ≥ m → place cow there.</span>
<span class="ty">bool</span> <span class="fn">checkCows</span>(<span class="ty">vector</span>&lt;<span class="ty">int</span>&gt;&amp; stalls,<span class="ty">int</span> S,<span class="ty">int</span> C,<span class="ty">int</span> m){  <span class="cm">// TC: O(S)</span>
    <span class="ty">int</span> lp=stalls[0],count=1;  <span class="cm">// place 1st cow at stalls[0]</span>
    <span class="kw">for</span>(<span class="ty">int</span> i=1;i&lt;S;i++){
        <span class="kw">if</span>(stalls[i]-lp&gt;=m){   <span class="cm">// distance ≥ m → place cow</span>
            lp=stalls[i];
            count++;
        }
    }
    <span class="kw">return</span> count&gt;=C;
}

<span class="ty">int</span> <span class="fn">maxDist</span>(<span class="ty">vector</span>&lt;<span class="ty">int</span>&gt;&amp; stalls,<span class="ty">int</span> S,<span class="ty">int</span> C){
    <span class="ty">int</span> l=1,h=stalls[S-1]-stalls[0],ans=0;
    <span class="kw">while</span>(l&lt;=h){
        <span class="ty">int</span> m=(l+h)/2;
        <span class="kw">if</span>(checkCows(stalls,S,C,m)){ans=m;l=m+1;}  <span class="cm">// can place → record, go right</span>
        <span class="kw">else</span>{h=m-1;}                                  <span class="cm">// cannot place → go left</span>
    }
    <span class="kw">return</span> ans;
}
<span class="cm">// Dry run: stalls={2,6,11,14,19,25,30,39,43}, C=4</span>
<span class="cm">// h=41, m=21: check(21,4)? lp=2,c=1: 6-2=4&lt;21, 11-2=9&lt;21, 14-2=12&lt;21, 19-2=17&lt;21,</span>
<span class="cm">//   25-2=23&gt;=21→lp=25,c=2: 30-25=5&lt;21, 39-25=14&lt;21, 43-25=18&lt;21 → c=2&lt;4 → false → h=20</span>
<span class="cm">// m=10: check(10,4)? lp=2,c=1: 11-2=9&lt;10, 14-2=12&gt;=10→lp=14,c=2: 25-14=11&gt;=10→lp=25,c=3</span>
<span class="cm">//   39-25=14&gt;=10→lp=39,c=4 → c=4&gt;=4 → true → ans=10, l=11</span>
<span class="cm">// m=15: check(15,4)? Not possible, c&lt;4 → h=14 | m=12: check(12,4)? lp=2,c=1</span>
<span class="cm">//   14-2=12&gt;=12→lp=14,c=2: 25-14=11&lt;12, 30-14=16&gt;=12→lp=30,c=3: 43-30=13&gt;=12→c=4→T</span>
<span class="cm">//   ans=12, l=13 | m=13: check? Not possible → h=12 | l=13&gt;h=12 → return 12 ✓</span></pre>
</div>

<div class="problem">
  <div class="prob-head"><div class="prob-title">GFG — Smallest Subarray with Sum ≥ S</div><div class="prob-meta"><span class="badge gfg">GFG</span><span class="badge med">Medium</span></div></div>
  <div class="prob-desc">Given arr[N] (positive) and S. Find length of smallest subarray with sum ≥ S.</div>
  <div class="ex-box"><span class="lbl">Example (from notes)</span>arr={4,5,6,13,6,9,8,7,12,4,3}, S=20 → ans=3 (subarray {6,9,8} or {13,6} etc)</div>
  <div class="approach-box"><div class="a-title">BS on answer (imaginary SS)</div>
    <p><strong>Target:</strong> Length of smallest subarray with sum ≥ S.</p>
    <p><strong>Search Space (Imaginary):</strong> [l=1, h=N].</p>
    <p><strong>Pattern:</strong> "There exists a subarray of length m with sum ≥ S" → F F F F [T] T T T ... T</p>
    <p><em>Why?</em> If there's a subarray of length m with sum ≥ S, removing 1 element reduces sum → sum &lt; S (for any length m-1 subarray). So shorter lengths are ALL False. Longer are ALL True.</p>
    <p><strong>Case 1:</strong> If check(m) → answer ≤ m → ans=m, go left. <strong>Case 2:</strong> check fails → go right.</p>
  </div>
<pre class="code"><span class="cm">// Check: does there exist a subarray of length m with sum >= S?</span>
<span class="cm">// Sliding window of size m: check max sum among all windows</span>
<span class="ty">bool</span> <span class="fn">isSub</span>(<span class="ty">vector</span>&lt;<span class="ty">int</span>&gt;&amp; arr,<span class="ty">int</span> m,<span class="ty">int</span> S){  <span class="cm">// TC: O(N)</span>
    <span class="ty">int</span> N=arr.size();
    <span class="ty">long long</span> ws=0;
    <span class="kw">for</span>(<span class="ty">int</span> i=0;i&lt;m;i++) ws+=arr[i];   <span class="cm">// first window</span>
    <span class="kw">if</span>(ws&gt;=S) <span class="kw">return</span> <span class="kw">true</span>;
    <span class="kw">for</span>(<span class="ty">int</span> i=m;i&lt;N;i++){
        ws+=arr[i]-arr[i-m];             <span class="cm">// slide window</span>
        <span class="kw">if</span>(ws&gt;=S) <span class="kw">return</span> <span class="kw">true</span>;
    }
    <span class="kw">return</span> <span class="kw">false</span>;
}

<span class="ty">int</span> <span class="fn">smallest</span>(<span class="ty">vector</span>&lt;<span class="ty">int</span>&gt;&amp; arr,<span class="ty">int</span> S){  <span class="cm">// TC: O(N log N)</span>
    <span class="ty">int</span> N=arr.size(),l=1,h=N,ans=-1;
    <span class="kw">while</span>(l&lt;=h){
        <span class="ty">int</span> m=(l+h)/2;
        <span class="kw">if</span>(isSub(arr,m,S)){ans=m;h=m-1;}  <span class="cm">// found → record, try smaller</span>
        <span class="kw">else</span>{l=m+1;}
    }
    <span class="kw">return</span> ans;
}</pre>
</div>

<div class="problem">
  <div class="prob-head"><div class="prob-title">LeetCode 410 — Split Array Largest Sum (Painter's Partition variant)</div><div class="prob-meta"><span class="badge lc">LeetCode</span><span class="badge hard">Hard</span></div></div>
  <div class="prob-desc">Split array into k subarrays to minimize the largest subarray sum. Exactly same as Painter's Partition!</div>
<pre class="code"><span class="ty">int</span> <span class="fn">splitArray</span>(<span class="ty">vector</span>&lt;<span class="ty">int</span>&gt;&amp; nums,<span class="ty">int</span> k){
    <span class="ty">long long</span> l=*max_element(nums.begin(),nums.end()),h=0;
    <span class="kw">for</span>(<span class="ty">int</span> x:nums) h+=x;
    <span class="ty">long long</span> ans=h;
    <span class="kw">while</span>(l&lt;=h){
        <span class="ty">long long</span> m=l+(h-l)/2;
        <span class="ty">int</span> parts=1; <span class="ty">long long</span> tw=0;
        <span class="kw">for</span>(<span class="ty">int</span> x:nums){tw+=x;<span class="kw">if</span>(tw&gt;m){parts++;tw=x;}}
        <span class="kw">if</span>(parts&lt;=k){ans=m;h=m-1;} <span class="kw">else</span> l=m+1;
    }
    <span class="kw">return</span> (<span class="ty">int</span>)ans;
}
<span class="cm">// Key: l=max(nums) not 1 — single element must fit in a subarray!</span></pre>
</div>

<div class="problem">
  <div class="prob-head"><div class="prob-title">LeetCode 1011 — Capacity to Ship Packages Within D Days</div><div class="prob-meta"><span class="badge lc">LeetCode</span><span class="badge med">Medium</span></div></div>
  <div class="prob-desc">Ship packages in order. Find minimum weight capacity to ship all in D days. Same pattern as Painter's Partition.</div>
<pre class="code"><span class="ty">int</span> <span class="fn">shipWithinDays</span>(<span class="ty">vector</span>&lt;<span class="ty">int</span>&gt;&amp; weights,<span class="ty">int</span> days){
    <span class="ty">int</span> l=*max_element(weights.begin(),weights.end());
    <span class="ty">int</span> h=0; <span class="kw">for</span>(<span class="ty">int</span> x:weights) h+=x;
    <span class="ty">int</span> ans=h;
    <span class="kw">while</span>(l&lt;=h){
        <span class="ty">int</span> m=l+(h-l)/2;
        <span class="ty">int</span> d=1; <span class="ty">int</span> tw=0;
        <span class="kw">for</span>(<span class="ty">int</span> x:weights){tw+=x;<span class="kw">if</span>(tw&gt;m){d++;tw=x;}}
        <span class="kw">if</span>(d&lt;=days){ans=m;h=m-1;} <span class="kw">else</span> l=m+1;
    }
    <span class="kw">return</span> ans;
}</pre>
</div>

<h3><span class="dot"></span>Summary — Binary Search Problem Recognition</h3>
<table class="tbl">
  <tr><th>Problem Type</th><th>SS Type</th><th>Pattern</th><th>Template</th></tr>
  <tr><td>Find k in sorted arr</td><td>Real (arr indices)</td><td>3 cases: ==, &lt;, &gt;</td><td>Classic BS</td></tr>

  <tr><td>Ceil / Last occurrence</td><td>Real</td><td>==: store ans, go right</td><td>Modified BS</td></tr>

  <tr><td>Minimize max / Maximize min</td><td>Imaginary [l..h]</td><td>FFFFTTTT or TTTTFFFF</td><td>BS on answer</td></tr>
</table>
`
},
];

function showModule(i){
  document.querySelectorAll('.module').forEach(m=>m.classList.remove('active'));

}
